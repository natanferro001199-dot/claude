name: Daily Data Refresh

on:
  schedule:
    - cron: '0 23 * * 1-5'   # Weekdays at 23:00 UTC (after US market close)
  workflow_dispatch:           # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('data-pipeline/requirements.txt') }}
          restore-keys: pip-

      - name: Cache HuggingFace FinBERT model (~400MB)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-finbert-v1
          restore-keys: hf-finbert-

      - name: Install Python dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Fetch market data
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python data-pipeline/fetch_data.py

      - name: Run sentiment analysis (FinBERT + RF)
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python data-pipeline/sentiment_analysis.py

      - name: Commit updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add public/data/
          git add data-pipeline/eval_log.csv || true
          git diff --cached --quiet || git commit -m "chore: refresh market data [skip ci]"
          git push
